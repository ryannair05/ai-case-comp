name: Draftly Test Suite

on: [push, pull_request]

jobs:
  # ---------------------------------------------------------------------------
  # Backend (Swift Vapor + SQLite)
  # ---------------------------------------------------------------------------
  test-backend:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode (Swift 6)
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: backend/.build
          key: ${{ runner.os }}-spm-${{ hashFiles('backend/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Resolve Swift packages
        run: cd backend && swift package resolve

      - name: Build
        run: cd backend && swift build

      - name: Run tests
        run: cd backend && swift test
        env:
          # Tests run without real API keys — services degrade gracefully
          JWT_SECRET: test-secret-key-for-ci-only

  # ---------------------------------------------------------------------------
  # Frontend (Next.js 14 + TypeScript)
  # ---------------------------------------------------------------------------
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npm run type-check

      - name: Build
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.draftly.ai
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
